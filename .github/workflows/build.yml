name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────
  # Windows → Icosahedron.exe
  # ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libcurl + CMake (MSYS2 MinGW64)
        # MinGW64 g++/curl is only for audio_core.cpp's plain-ctypes build
        # (player/components/audio_core.dll) — a separate, simpler build
        # from the scratch-waveform QML plugin below, with no Qt6 ABI
        # concerns since it's loaded via ctypes, not QPluginLoader.
        run: C:\msys64\usr\bin\pacman -S --noconfirm mingw-w64-x86_64-curl mingw-w64-x86_64-cmake
        shell: cmd

      - name: Add MinGW64 to PATH
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller aqtinstall

      - name: Install Qt6 (MSVC, matching PyQt6-Qt6's pinned version)
        # The scratch-waveform QML plugin must be built against an MSVC-built
        # Qt6 kit at the *same* version as PyQt6-Qt6 (requirements.txt) — Qt's
        # plugin loader rejects any version or ABI (MinGW vs MSVC) mismatch
        # outright. MSYS2's qt6-declarative package is MinGW-only, so it can't
        # satisfy this; aqtinstall fetches the official MSVC kit instead.
        # build.py's _find_qt6_cmake_prefix() picks this up automatically.
        run: aqt install-qt windows desktop 6.10.2 win64_msvc2022_64 -O C:\Qt

      - name: Build audio_core.dll
        run: python build.py
        env:
          CURL_DIR: C:\msys64\mingw64
          PYTHONIOENCODING: utf-8

      - name: Verify scratch-waveform plugin was built
        # build.py treats a failed CMake/Qt6 build as non-fatal (so devs
        # without Qt6 dev tools installed can still build everything else),
        # so a broken plugin build wouldn't otherwise fail this job — it'd
        # silently ship an exe whose footer panel fails to load at runtime
        # (footer_bar.qml's `import FooterNativeWaveform 1.0` is unconditional).
        run: |
          if (-not (Test-Path "player/native/scratch_waveform/build/qml/FooterNativeWaveform/qmldir")) {
            Write-Error "scratch-waveform QML plugin was not built — see the build.py output above."
            exit 1
          }

      - name: Build Icosahedron.exe
        run: python build_exe.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Rename Windows binary
        run: mv dist/Icosahedron.exe dist/Icosahedron-win-x64.exe

      - name: Upload Icosahedron-win-x64.exe
        uses: actions/upload-artifact@v4
        with:
          name: Icosahedron-Windows
          path: dist/Icosahedron-win-x64.exe

  # ──────────────────────────────────────────
  # Linux → Icosahedron (portable binary)
  # ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ libcurl4-openssl-dev \
            cmake qt6-base-dev qt6-declarative-dev \
            libgl1 libegl1 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libpython3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller evdev

      - name: Build audio_core.so
        run: python build.py

      - name: Verify scratch-waveform plugin was built
        run: test -f player/native/scratch_waveform/build/qml/FooterNativeWaveform/qmldir

      - name: Build Icosahedron Linux binary
        run: python build_appimage.py

      - name: Rename Linux binary
        run: mv dist/Icosahedron dist/Icosahedron-linux-x64.appimage

      - name: Upload Icosahedron-linux-x64.appimage
        uses: actions/upload-artifact@v4
        with:
          name: Icosahedron-Linux
          path: dist/Icosahedron-linux-x64.appimage

  # ──────────────────────────────────────────
  # Publish both as a GitHub Release
  # ──────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Icosahedron-Windows
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Icosahedron-Linux
          path: artifacts/linux

      - name: Delete stale Latest Build release
        if: startsWith(github.ref, 'refs/heads/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Generate Latest Build body
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          printf '**Automated build** from `master` — %s\n\n**Commit:** [`%s`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n**Message:** %s\n' \
            "$DATE" "$SHORT" "$MSG" > /tmp/release_body.md

      - name: Publish latest (branch push)
        if: startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          body_path: /tmp/release_body.md
          files: |
            artifacts/windows/Icosahedron-win-x64.exe
            artifacts/linux/Icosahedron-linux-x64.appimage

      - name: Publish versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/windows/Icosahedron-win-x64.exe
            artifacts/linux/Icosahedron-linux-x64.appimage
